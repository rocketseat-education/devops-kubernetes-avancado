apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass

metadata:
  name: envoy

spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway

metadata:
  name: main-gateway
  namespace: infra

spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.eusouodaniel.xyz"
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: app-ts-route
  namespace: app

spec:
  parentRefs:
    - name: main-gateway
      namespace: infra
      sectionName: http
  hostnames:
    - "app-ts.eusouodaniel.xyz"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
      - name: app-ts-svc
        port: 80
          