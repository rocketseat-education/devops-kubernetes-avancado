apiVersion: gateway.networking.k8s.io/v1
kind: Gateway

metadata:
  name: main-gateway
  namespace: infra

spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.eusouodaniel.xyz"

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: app-ts-route
  namespace: app

spec:
  parentRefs:
  - name: main-gateway
    namespace: infra
  hostnames:
  - "app-ts.eusouodaniel.xyz"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
      - name: app-ts-svc
        port: 80
          